<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Interval Timer — 1:00 + 0:30 × 5</title>
<style>
  body {
    background:#0f1724; color:#e6eef9; font-family:system-ui, -apple-system, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    height:100vh; margin:0; text-align:center;
  }
  h1 {font-size:1.2rem; color:#9aa9c7;}
  #time {font-size:5rem; font-weight:700; letter-spacing:-2px; margin:10px 0;}
  #phase {font-size:1.3rem; margin-bottom:10px;}
  #message {font-size:1.1rem; color:#ffd166; height:1.2em;}
  button {
    background:#16253a; color:white; border:0; border-radius:12px;
    padding:14px 24px; margin:6px; font-size:1rem;
  }
  .progress {
    width:80%; height:14px; background:rgba(255,255,255,0.08);
    border-radius:8px; overflow:hidden; margin:14px auto;
  }
  .bar {
    height:100%; width:0; background:linear-gradient(90deg,#ffd166,#ff9f1c);
  }
</style>
</head>
<body>
  <h1>Interval Timer — 1 min / 30 s × 5</h1>
  <div id="phase">Ready</div>
  <div id="time">01:00</div>
  <div id="message"></div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>

<script>
(() => {
  const TOTAL_SETS = 5;
  const MINUTE_MS = 60_000;
  const SPRINT_MS = 30_000;

  const timeEl = document.getElementById('time');
  const phaseEl = document.getElementById('phase');
  const msgEl = document.getElementById('message');
  const barEl = document.getElementById('bar');

  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const resetBtn = document.getElementById('resetBtn');

  let ctx, running=false, paused=false;
  let currentSet=1, phase='ready', endTime=null, remaining=0;

  function ensureAudio() {
    if (!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
  }
  function beep(freq=880, dur=120, vol=0.15) {
    ensureAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.frequency.value=freq;
    g.gain.value=vol;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur/1000);
    o.stop(ctx.currentTime + dur/1000 + 0.02);
  }
  function longBeep() { beep(880,400,0.18); }

  function beepPattern() {
    // beep beep beep beep beeeep
    let t=0;
    for (let i=0;i<4;i++){
      setTimeout(()=>beep(), t);
      t+=600;
    }
    setTimeout(()=>longBeep(), t);
  }

  function fmt(ms){
    const s=Math.ceil(ms/1000);
    const m=Math.floor(s/60);
    const sec=s%60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function startPhase(p,dur){
    phase=p;
    endTime=performance.now()+dur;
    if(p==='minute') phaseEl.textContent=`Set ${currentSet}: 1 min`;
    else phaseEl.textContent=`Set ${currentSet}: 30 s sprint`;
    msgEl.textContent='';
  }

  function start(){
    ensureAudio();
    ctx.resume?.();
    if(!running){
      running=true; paused=false;
      if(phase==='ready') startPhase('minute',MINUTE_MS);
      if(!ticker) ticker=setInterval(tick,100);
    }
  }
  function pause(){
    if(!running) return;
    paused=true; running=false;
    remaining=endTime-performance.now();
    endTime=null;
  }
  function reset(){
    running=false; paused=false;
    currentSet=1; phase='ready'; endTime=null;
    timeEl.textContent='01:00'; barEl.style.width='0%';
    phaseEl.textContent='Ready'; msgEl.textContent='';
  }

  let ticker=null;
  function tick(){
    if(!running||!endTime) return;
    const now=performance.now();
    let rem=Math.max(0,endTime-now);
    timeEl.textContent=fmt(rem);
    let dur=(phase==='minute'?MINUTE_MS:SPRINT_MS);
    barEl.style.width=`${(1-rem/dur)*100}%`;

    // Last 5s pattern
    if(rem<=5000 && !state._beeped){
      state._beeped=true;
      beepPattern();
      // last beep ends roughly 3s before 0
      setTimeout(()=>{
        // when pattern done, move to next phase
        advancePhase();
      }, 4*600+500);
    }
  }

  function advancePhase(){
    if(phase==='minute'){
      state._beeped=false;
      startPhase('sprint',SPRINT_MS);
    } else if(phase==='sprint'){
      state._beeped=false;
      if(currentSet>=TOTAL_SETS){
        finishAll();
      } else {
        currentSet++;
        startPhase('minute',MINUTE_MS);
      }
    }
  }

  function finishAll(){
    running=false;
    phase='done';
    phaseEl.textContent='All sets complete!';
    msgEl.textContent='✅';
    barEl.style.width='100%';
    timeEl.textContent='00:00';
    beepPattern();
  }

  const state={_beeped:false};

  startBtn.onclick=()=>{start();startBtn.disabled=true;};
  pauseBtn.onclick=()=>{pause();startBtn.disabled=false;};
  resetBtn.onclick=()=>{reset();startBtn.disabled=false;};

  reset();
})();
</script>
</body>
</html>
