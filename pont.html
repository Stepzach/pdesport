<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Interval Timer — Train-Style Beeps</title>
<style>
  body{
    background:#0f1724;color:#e6eef9;font-family:system-ui,-apple-system,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;margin:0;text-align:center;
  }
  h1{font-size:1.1rem;color:#9aa9c7;}
  #time{font-size:5rem;font-weight:700;letter-spacing:-2px;margin:10px 0;}
  #phase{font-size:1.3rem;margin-bottom:8px;}
  #message{font-size:1.1rem;color:#ffd166;height:1.2em;}
  button{
    background:#16253a;color:white;border:0;border-radius:12px;
    padding:14px 24px;margin:6px;font-size:1rem;
  }
  .progress{width:80%;height:14px;background:rgba(255,255,255,0.08);
    border-radius:8px;overflow:hidden;margin:14px auto;}
  .bar{height:100%;width:0;background:linear-gradient(90deg,#ffd166,#ff9f1c);}
</style>
</head>
<body>
  <h1>Interval Timer — 1 min / 30 s × 5</h1>
  <div id="phase">Ready</div>
  <div id="time">01:00</div>
  <div id="message"></div>
  <div class="progress"><div class="bar" id="bar"></div></div>
  <div>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>

<script>
(()=>{
  const TOTAL_SETS=5;
  const MIN_MS=60_000;
  const SPRINT_MS=30_000;

  const timeEl=document.getElementById('time');
  const phaseEl=document.getElementById('phase');
  const msgEl=document.getElementById('message');
  const barEl=document.getElementById('bar');
  const startBtn=document.getElementById('startBtn');
  const pauseBtn=document.getElementById('pauseBtn');
  const resetBtn=document.getElementById('resetBtn');

  let ctx, running=false, paused=false;
  let currentSet=1, phase='ready', endTime=null, remaining=0;
  const state={_beeped:false};

  function ensureAudio(){
    if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)();
  }

  // crisp train-door beep (square wave)
  function beep(freq=880,dur=180,vol=0.35){
    ensureAudio();
    const now=ctx.currentTime;
    const o=ctx.createOscillator();
    const g=ctx.createGain();
    o.type='square';
    o.frequency.setValueAtTime(freq,now);
    g.gain.setValueAtTime(vol,now);
    g.gain.exponentialRampToValueAtTime(0.0001,now+dur/1000);
    o.connect(g); g.connect(ctx.destination);
    o.start(now);
    o.stop(now+dur/1000);
  }
  function longBeep(freq=880,dur=1000,vol=0.45){beep(freq,dur,vol);}

  // beep pattern lasting exactly 5 s total
  function beepPattern(endCallback){
    const pattern=[
      {t:0.0,type:'short'},
      {t:1.0,type:'short'},
      {t:2.0,type:'short'},
      {t:3.0,type:'short'},
      {t:4.2,type:'long'}
    ];
    for(const p of pattern){
      setTimeout(()=>{p.type==='short'?beep():longBeep();},p.t*1000);
    }
    setTimeout(()=>{if(endCallback)endCallback();},5000);
  }

  function fmt(ms){
    const s=Math.ceil(ms/1000);
    const m=Math.floor(s/60);
    const sec=s%60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function startPhase(p,dur){
    phase=p;
    endTime=performance.now()+dur;
    state._beeped=false;
    if(p==='minute') phaseEl.textContent=`Set ${currentSet}: 1 min steady`;
    else phaseEl.textContent=`Set ${currentSet}: 30 s sprint`;
    msgEl.textContent='';
    if(currentSet===1 && p==='minute'){  // single start beep
      beep();
    }
  }

  function start(){
    ensureAudio(); ctx.resume?.();
    if(!running){
      running=true; paused=false;
      if(phase==='ready') startPhase('minute',MIN_MS);
      if(!ticker) ticker=setInterval(tick,100);
    }
  }
  function pause(){
    if(!running)return;
    paused=true; running=false;
    remaining=endTime-performance.now();
    endTime=null;
  }
  function reset(){
    running=false; paused=false;
    currentSet=1; phase='ready'; endTime=null;
    timeEl.textContent='01:00'; barEl.style.width='0%';
    phaseEl.textContent='Ready'; msgEl.textContent='';
    state._beeped=false;
  }

  let ticker=null;
  function tick(){
    if(!running||!endTime)return;
    const now=performance.now();
    const rem=Math.max(0,endTime-now);
    const dur=(phase==='minute'?MIN_MS:SPRINT_MS);
    timeEl.textContent=fmt(rem);
    barEl.style.width=`${(1-rem/dur)*100}%`;

    // Start beep sequence exactly 5 s before end
    if(rem<=5000 && !state._beeped){
      state._beeped=true;
      beepPattern(()=>advancePhase());
    }
  }

  function advancePhase(){
    if(phase==='minute'){
      startPhase('sprint',SPRINT_MS);
    }else if(phase==='sprint'){
      if(currentSet>=TOTAL_SETS){finishAll();}
      else{currentSet++; startPhase('minute',MIN_MS);}
    }
  }

  function finishAll(){
    running=false;
    phase='done';
    phaseEl.textContent='All sets complete!';
    msgEl.textContent='✅';
    barEl.style.width='100%';
    timeEl.textContent='00:00';
    beepPattern();
  }

  startBtn.onclick=()=>{start();startBtn.disabled=true;};
  pauseBtn.onclick=()=>{pause();startBtn.disabled=false;};
  resetBtn.onclick=()=>{reset();startBtn.disabled=false;};

  reset();
})();
</script>
</body>
</html>
